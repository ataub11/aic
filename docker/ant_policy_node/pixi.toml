# Minimal pixi manifest for Docker inference image.
# Excludes lerobot_robot_aic, aic_teleoperation, and all training/dev packages.
# Only linux-64 — this manifest is never used on the host.
[workspace]
name = "aic-docker"
channels = ["robostack-kilted", "conda-forge"]
platforms = ["linux-64"]
version = "0.1.0"
conda-pypi-map = { "robostack-kilted" = "robostack_mapping.json" }
preview = ["pixi-build"]

[dependencies]
numpy = "*"
# opencv installed via pip below to avoid libprotobuf conflict with ros2-distro-mutex 0.14.0
ros-kilted-aic-control-interfaces = { path = "aic_interfaces/aic_control_interfaces" }
ros-kilted-aic-example-policies = { path = "aic_example_policies" }
ros-kilted-aic-model = { path = "aic_model" }
ros-kilted-aic-model-interfaces = { path = "aic_interfaces/aic_model_interfaces" }
ros-kilted-aic-task-interfaces = { path = "aic_interfaces/aic_task_interfaces" }
ros-kilted-ant-policy-node = { path = "ant_policy_node" }
ros-kilted-geometry-msgs = "*"
ros-kilted-rclpy = "*"
ros-kilted-rmw-zenoh-cpp = "*"
ros-kilted-ros-core = "*"
ros-kilted-sensor-msgs = "*"
ros-kilted-std-srvs = "*"
ros-kilted-tf2-ros-py = "*"
ros-kilted-trajectory-msgs = "*"

[pypi-dependencies]
opencv-python-headless = "*"

[activation]
scripts = ["pixi_env_setup.sh"]
